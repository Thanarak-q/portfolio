<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Thanarak Kanyaprasit — Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    /* ===== Base ===== */
    :root {
      --bg-warm: #f3ead8;
      --bg-cool: #d9e3ee;
      --bg-rose: #ecd8d2;
      --ink: #1a1410;
      --ink-soft: #3a302a;
      --ink-mute: rgba(26, 20, 16, 0.55);
      --leak: #f6a86b;
      --leak-deep: #d65a3a;
      --sky: #6c9bc8;
      --glass-tint: rgba(255, 252, 246, 0.18);
      --glass-stroke: rgba(255, 255, 255, 0.35);
      --glass-stroke-dark: rgba(20, 10, 5, 0.06);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { background: #1a1410; }
    body {
      font-family: "Hanken Grotesk", ui-sans-serif, system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(120% 80% at 50% 0%, #f7ecd6 0%, #ecd8d2 35%, #d9e3ee 70%, #c9d7e7 100%);
      background-attachment: fixed;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      letter-spacing: -0.005em;
    }

    .serif { font-family: "Instrument Serif", "Cormorant Garamond", Georgia, serif; }
    .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

    /* ===== Selection ===== */
    ::selection { background: var(--leak); color: #fff; }

    /* ===== Page Atmosphere (fixed overlays) ===== */
    .atmo {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1000;
    }
    .atmo.grain {
      opacity: 0.16;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0 0.5  0 0 0 0.55 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }
    .atmo.vignette {
      background: radial-gradient(120% 90% at 50% 50%, transparent 55%, rgba(20, 10, 5, 0.28) 100%);
    }
    .atmo.leak {
      mix-blend-mode: screen;
      opacity: 0.55;
      background:
        radial-gradient(40% 90% at -5% 50%, rgba(246, 168, 107, 0.55), transparent 60%),
        radial-gradient(35% 70% at 105% 30%, rgba(214, 90, 58, 0.35), transparent 60%);
    }

    /* ===== Glass ===== */
    .glass {
      background: var(--glass-tint);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-stroke);
      border-radius: 28px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.55),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08),
        inset 0 0 40px rgba(255, 255, 255, 0.05),
        0 12px 40px rgba(20, 10, 5, 0.10),
        0 2px 6px rgba(20, 10, 5, 0.04);
      position: relative;
      overflow: hidden;
    }
    .glass::before {
      /* refractive specular highlight */
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.45) 0%, transparent 28%),
        linear-gradient(315deg, rgba(255,255,255,0.18) 0%, transparent 35%);
      mix-blend-mode: overlay;
      border-radius: inherit;
    }
    .glass.dark {
      background: rgba(20, 10, 5, 0.22);
      border: 1px solid rgba(255,255,255,0.15);
      color: #f7ecd6;
    }

    .pebble {
      border-radius: 999px;
    }

    /* ===== Layout helpers ===== */
    .wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 28px; }
    .stack { display: flex; flex-direction: column; gap: 24px; }

    /* ===== Hero / scroll-video region ===== */
    #hero {
      position: relative;
      height: 500vh; /* scroll runway */
    }
    .hero-sticky {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    .hero-video-stack {
      position: absolute;
      inset: 0;
      background: #0c0805;
    }
    .hero-video-stack video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.18s linear;
      filter: saturate(1.05) contrast(1.02);
    }
    .hero-video-stack video.active { opacity: 1; }
    .hero-video-stack .film-tint {
      position: absolute; inset: 0;
      background:
        radial-gradient(100% 70% at 50% 50%, transparent 55%, rgba(20,10,5,0.42) 100%),
        linear-gradient(180deg, rgba(255,200,140,0.06), rgba(120,90,150,0.05));
      pointer-events: none;
    }
    .hero-video-stack .leak-anim {
      position: absolute;
      top: 0; bottom: 0; width: 30%;
      background: radial-gradient(closest-side, rgba(246,168,107,0.55), rgba(214,90,58,0.18) 50%, transparent 80%);
      mix-blend-mode: screen;
      pointer-events: none;
      filter: blur(2px);
    }

    /* ===== Top Nav (liquid glass pebble) ===== */
    .nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px;
      border-radius: 999px;
      max-width: calc(100vw - 32px);
    }
    .nav .brand {
      padding: 8px 14px 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      letter-spacing: -0.01em;
      font-size: 14px;
    }
    .nav .brand .dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: var(--leak-deep);
      box-shadow: 0 0 0 3px rgba(214,90,58,0.18);
    }
    .nav-links { display: flex; gap: 2px; }
    .nav-links a {
      padding: 9px 14px;
      border-radius: 999px;
      color: var(--ink-soft);
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      transition: background 0.2s, color 0.2s;
    }
    .nav-links a:hover { background: rgba(255,255,255,0.4); color: var(--ink); }
    .nav-cta {
      padding: 9px 16px;
      border-radius: 999px;
      background: var(--ink);
      color: #f7ecd6;
      font-size: 13.5px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: var(--leak-deep); }

    @media (max-width: 640px) {
      .nav-links { display: none; }
      .nav .brand .role-mini { display: none; }
    }

    /* ===== Hero overlay ===== */
    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 40px 40px;
      pointer-events: none;
    }
    .hero-overlay > * { pointer-events: auto; }
    .hero-title {
      font-family: "Instrument Serif", serif;
      color: #f7ecd6;
      font-weight: 400;
      font-size: clamp(56px, 10vw, 160px);
      line-height: 0.92;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 30px rgba(0,0,0,0.35);
      margin: 0 0 16px;
    }
    .hero-title .it { font-style: italic; color: #ffd9b6; }
    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      color: #f7ecd6;
    }
    .hero-meta .role {
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.85;
    }
    .hero-meta .role span { margin: 0 10px; opacity: 0.5; }
    .hero-scroll-hint {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
      opacity: 0.8;
    }
    .hero-scroll-hint .bar {
      width: 40px; height: 1px; background: currentColor; opacity: 0.7;
      position: relative; overflow: hidden;
    }
    .hero-scroll-hint .bar::after {
      content: ""; position: absolute; left: -40%; top: 0; width: 40%; height: 100%;
      background: #ffd9b6;
      animation: hint 2.4s linear infinite;
    }
    @keyframes hint {
      0% { transform: translateX(0); }
      100% { transform: translateX(250%); }
    }

    /* Frame counter glass chip */
    .frame-chip {
      position: absolute;
      top: 90px;
      right: 24px;
      z-index: 11;
      padding: 10px 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #f7ecd6;
      border-radius: 14px;
      background: rgba(20,10,5,0.28);
      backdrop-filter: blur(14px) saturate(160%);
      -webkit-backdrop-filter: blur(14px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
      display: flex; align-items: center; gap: 10px;
    }
    .frame-chip .live-dot {
      width: 6px; height: 6px; border-radius: 999px;
      background: var(--leak); box-shadow: 0 0 0 3px rgba(246,168,107,0.25);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .frame-chip .tcode { color: #ffd9b6; }
    .frame-chip .label { opacity: 0.65; }

    /* progress rail along bottom of hero */
    .hero-progress {
      position: absolute;
      left: 24px; right: 24px; bottom: 14px;
      height: 2px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      overflow: hidden;
      z-index: 11;
    }
    .hero-progress .fill {
      position: absolute; inset: 0; right: auto;
      width: 0;
      background: linear-gradient(90deg, #ffd9b6, #f6a86b, #d65a3a);
      border-radius: 2px;
      transition: width 0.08s linear;
    }

    /* ===== Content section common ===== */
    section.content {
      position: relative;
      z-index: 2;
      padding: 120px 0;
    }
    .eyebrow {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-mute);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .eyebrow::before {
      content: "";
      width: 22px; height: 1px; background: currentColor; opacity: 0.5;
    }

    h2.section-title {
      font-family: "Instrument Serif", serif;
      font-weight: 400;
      font-size: clamp(40px, 6vw, 84px);
      line-height: 0.96;
      letter-spacing: -0.02em;
      margin: 14px 0 0;
      text-wrap: pretty;
    }
    h2.section-title .it { font-style: italic; color: var(--leak-deep); }

    p.body {
      font-size: 18px;
      line-height: 1.55;
      color: var(--ink-soft);
      text-wrap: pretty;
    }
    p.lead {
      font-family: "Instrument Serif", serif;
      font-size: clamp(22px, 2.6vw, 30px);
      line-height: 1.35;
      letter-spacing: -0.01em;
      font-style: italic;
      color: var(--ink-soft);
      text-wrap: pretty;
    }

    /* ===== About ===== */
    #about .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
      align-items: start;
    }
    @media (max-width: 880px) { #about .grid { grid-template-columns: 1fr; } }

    .about-card { padding: 44px; }
    .about-side {
      display: flex; flex-direction: column; gap: 18px;
    }
    .stat {
      padding: 22px 24px;
      display: flex; align-items: baseline; justify-content: space-between; gap: 16px;
    }
    .stat .k { font-family: "Instrument Serif", serif; font-style: italic; font-size: 44px; line-height: 1; color: var(--ink); }
    .stat .l { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-mute); text-align: right; max-width: 50%; }

    /* ===== Focus area cards ===== */
    #focus .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 40px;
    }
    @media (max-width: 880px) { #focus .cards { grid-template-columns: 1fr; } }

    .focus-card {
      padding: 28px;
      display: flex; flex-direction: column; gap: 16px;
      min-height: 340px;
      position: relative;
    }
    .focus-card .num {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--ink-mute);
    }
    .focus-card h3 {
      font-family: "Instrument Serif", serif;
      font-weight: 400;
      font-size: 36px;
      line-height: 1;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .focus-card h3 .it { font-style: italic; color: var(--leak-deep); }
    .focus-card p { font-size: 15px; line-height: 1.5; color: var(--ink-soft); margin: 0; }
    .focus-card .tags { margin-top: auto; display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(20,10,5,0.05);
      color: var(--ink-soft);
      border: 1px solid rgba(20,10,5,0.06);
    }

    /* ===== Selected Work list ===== */
    #work .list { margin-top: 40px; display: flex; flex-direction: column; gap: 1px; background: rgba(20,10,5,0.08); border-radius: 24px; overflow: hidden; }
    .row {
      display: grid;
      grid-template-columns: 80px 1.6fr 1fr 100px;
      gap: 20px;
      align-items: center;
      padding: 24px 28px;
      background: rgba(255,252,246,0.55);
      backdrop-filter: blur(8px);
      transition: background 0.25s, transform 0.25s;
      cursor: pointer;
    }
    .row:hover { background: rgba(255,252,246,0.85); }
    .row .num { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--ink-mute); letter-spacing: 0.1em; }
    .row .title { font-family: "Instrument Serif", serif; font-size: 26px; line-height: 1.1; }
    .row .title .it { font-style: italic; color: var(--leak-deep); }
    .row .desc { font-size: 14px; color: var(--ink-soft); }
    .row .meta { font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--ink-mute); letter-spacing: 0.1em; text-align: right; }
    @media (max-width: 880px) {
      .row { grid-template-columns: 36px 1fr; grid-template-rows: auto auto; }
      .row .desc, .row .meta { grid-column: 2; }
      .row .num { grid-row: 1 / span 2; align-self: start; padding-top: 4px; }
    }

    /* ===== Reel filmstrip ===== */
    #reel { padding-top: 80px; padding-bottom: 80px; }
    .filmstrip {
      margin-top: 40px;
      padding: 16px 0;
      background: #1a1410;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.6), 0 20px 50px rgba(20,10,5,0.18);
    }
    .filmstrip::before, .filmstrip::after {
      content: "";
      position: absolute; left: 0; right: 0; height: 16px;
      background:
        repeating-linear-gradient(90deg, #1a1410 0 22px, #f3ead8 22px 38px);
      mix-blend-mode: normal;
    }
    .filmstrip::before { top: 0; }
    .filmstrip::after { bottom: 0; }
    .filmstrip .track {
      display: flex;
      gap: 12px;
      padding: 22px 22px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .filmstrip .track::-webkit-scrollbar { display: none; }
    .filmstrip .frame {
      flex: 0 0 auto;
      width: clamp(260px, 32vw, 420px);
      aspect-ratio: 16/9;
      border-radius: 6px;
      overflow: hidden;
      scroll-snap-align: start;
      position: relative;
      filter: saturate(1.05) contrast(1.02);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    }
    .filmstrip .frame img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .filmstrip .frame .tcode {
      position: absolute; bottom: 8px; left: 10px;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      color: #ffd9b6;
      letter-spacing: 0.12em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    /* ===== Contact ===== */
    #contact { padding-top: 80px; padding-bottom: 120px; }
    .contact-card {
      padding: 60px 48px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 32px;
      align-items: center;
    }
    @media (max-width: 720px) { .contact-card { grid-template-columns: 1fr; } }
    .contact-card h2 { margin: 0; }
    .contact-actions { display: flex; flex-direction: column; gap: 10px; min-width: 240px; }
    .link-pill {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(20,10,5,0.06);
      border: 1px solid rgba(20,10,5,0.06);
      text-decoration: none;
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s, transform 0.2s;
    }
    .link-pill:hover { background: var(--ink); color: #f7ecd6; transform: translateX(2px); }
    .link-pill .arrow { font-family: "JetBrains Mono", monospace; font-size: 12px; opacity: 0.6; }
    .link-pill:hover .arrow { opacity: 1; }

    /* ===== Footer ===== */
    footer.foot {
      padding: 40px 0 60px;
      text-align: center;
      color: var(--ink-mute);
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* hide root before React mounts */
    #root:empty + .loading {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      color: #f7ecd6; background: #1a1410;
      font-family: "Instrument Serif", serif; font-style: italic; font-size: 20px;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <!-- Top liquid-glass nav (static, not React) -->
  <nav class="nav glass" aria-label="Primary">
    <div class="brand">
      <span class="dot" aria-hidden="true"></span>
      <span>thanarak<span class="role-mini" style="opacity:0.5;margin-left:6px;">/ red&nbsp;team</span></span>
    </div>
    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#focus">Focus</a>
      <a href="#work">Work</a>
      <a href="#reel">Reel</a>
    </div>
    <a class="nav-cta" href="#contact">Contact</a>
  </nav>

  <div id="root"></div>
  <div class="loading">loading film…</div>

  <!-- Atmosphere overlays (above content, below nav) -->
  <div class="atmo grain" aria-hidden="true"></div>
  <div class="atmo vignette" aria-hidden="true"></div>
  <div class="atmo leak" aria-hidden="true"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="hero.jsx"></script>
  <script type="text/babel" src="content.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
